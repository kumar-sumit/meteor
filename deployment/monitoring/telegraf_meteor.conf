# Telegraf Configuration for Meteor Server Monitoring
# Place this file in /etc/telegraf/telegraf.d/

[global_tags]
  service = "meteor"
  environment = "production"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  hostname = ""
  omit_hostname = false

# Meteor Server Metrics via Redis Protocol
[[inputs.redis]]
  servers = ["tcp://127.0.0.1:6379"]
  tagpass = {service=["meteor"]}
  
  # Meteor-specific INFO fields
  fielddrop = ["redis_version", "redis_git_sha1", "redis_build_id"]
  
  # Rename fields for clarity
  [inputs.redis.tags]
    server = "meteor"
    
# Meteor Custom Metrics via HTTP endpoint
[[inputs.http]]
  urls = ["http://127.0.0.1:8001/metrics"]
  method = "GET"
  timeout = "5s"
  data_format = "prometheus"
  interval = "10s"
  [inputs.http.tags]
    service = "meteor"
    source = "internal"

# Process monitoring for Meteor
[[inputs.procstat]]
  exe = "meteor-server"
  pid_tag = true
  [inputs.procstat.tags]
    service = "meteor"

# System monitoring for Meteor host
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  [inputs.cpu.tags]
    service = "meteor"

[[inputs.mem]]
  [inputs.mem.tags]
    service = "meteor"

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "overlay", "aufs", "squashfs"]
  [inputs.disk.tags]
    service = "meteor"

[[inputs.diskio]]
  [inputs.diskio.tags]
    service = "meteor"

[[inputs.net]]
  [inputs.net.tags]
    service = "meteor"

# Log monitoring
[[inputs.logparser]]
  files = ["/var/log/meteor/meteor.log"]
  from_beginning = false
  [inputs.logparser.grok]
    patterns = ["%{TIMESTAMP_ISO8601:timestamp} %{WORD:level} %{GREEDYDATA:message}"]
    measurement = "meteor_logs"
    [inputs.logparser.grok.tags]
      service = "meteor"

# Custom health check
[[inputs.exec]]
  commands = ["/opt/meteor/bin/healthcheck.sh"]
  timeout = "10s"
  data_format = "value"
  data_type = "integer"
  name_override = "meteor_health"
  [inputs.exec.tags]
    service = "meteor"

# Output to InfluxDB for Grafana
[[outputs.influxdb]]
  urls = ["http://localhost:8086"]
  database = "meteor"
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"
  [outputs.influxdb.tagpass]
    service = ["meteor"]

