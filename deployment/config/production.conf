# Meteor Server Production Configuration
# Version: 8.0 Enterprise
# Environment: Production

# === NETWORK CONFIGURATION ===
bind = 0.0.0.0                    # Bind to all interfaces (use 127.0.0.1 for localhost only)
port = 6379                       # Redis-compatible port
tcp-backlog = 511                 # TCP listen backlog
tcp-keepalive = 300               # TCP keepalive in seconds
timeout = 0                       # Client timeout (0 = disabled)
tcp-nodelay = yes                 # Disable Nagle algorithm for low latency

# === SERVER CONFIGURATION ===
cores = 8                         # Number of cores to use
shards = 8                        # Number of shards (should match cores for optimal performance)
memory = 16384                    # Maximum memory in MB
ssd-path = /var/lib/meteor/ssd    # SSD cache path (optional)

# === PERFORMANCE TUNING ===
pipeline-enabled = true           # Enable Redis pipeline support
work-stealing = true              # Enable work-stealing for load balancing
numa-aware = true                 # NUMA-aware memory allocation
cpu-affinity = true              # Enable CPU affinity for threads
simd-enabled = true              # Enable SIMD optimizations (AVX-512/AVX2)
io-uring = true                  # Use io_uring for async I/O (Linux only)

# === PERSISTENCE CONFIGURATION ===
save-snapshots = true            # Enable periodic snapshots
snapshot-interval = 300          # Snapshot interval in seconds (5 minutes)
snapshot-path = /var/lib/meteor/snapshots
auto-snapshot-count = 10         # Keep last 10 snapshots
compression = lz4                # Snapshot compression (none, lz4, zstd)

# === TTL CONFIGURATION ===
ttl-enabled = true               # Enable TTL functionality
ttl-check-interval = 1           # TTL cleanup interval in seconds
ttl-batch-size = 1000           # Keys to check per TTL cycle

# === LOGGING CONFIGURATION ===
log-level = info                 # Log level (debug, info, warn, error)
log-file = /var/log/meteor/meteor.log
log-rotate = daily               # Log rotation (daily, weekly, size)
log-max-size = 100MB            # Maximum log file size
syslog-enabled = true           # Enable syslog integration
syslog-ident = meteor           # Syslog identifier

# === MONITORING CONFIGURATION ===
metrics-enabled = true          # Enable metrics collection
metrics-port = 8001            # Metrics HTTP endpoint port
metrics-interval = 10          # Metrics update interval in seconds
metrics-format = prometheus    # Metrics format (prometheus, json)
health-check-port = 8002      # Health check endpoint port

# === SECURITY CONFIGURATION ===
protected-mode = true          # Enable protected mode
require-auth = false          # Require authentication (set to true in production)
# auth-password = your_secure_password_here
# auth-users = admin:admin_password,readonly:readonly_password
max-clients = 10000           # Maximum concurrent clients
client-timeout = 300          # Client idle timeout in seconds

# === MEMORY MANAGEMENT ===
max-memory-policy = volatile-lru   # Memory eviction policy
# Options: noeviction, allkeys-lru, volatile-lru, allkeys-random, volatile-random, volatile-ttl
memory-samples = 5                 # LRU samples for eviction
lazy-free = true                  # Lazy deletion for large objects

# === REPLICATION (Future) ===
# replica-of = master_host master_port
# replica-read-only = true
# replica-priority = 100

# === CLUSTER CONFIGURATION (Future) ===
# cluster-enabled = false
# cluster-config-file = /var/lib/meteor/cluster.conf
# cluster-node-timeout = 15000

# === ADVANCED PERFORMANCE ===
hash-max-ziplist-entries = 512    # Hash optimization threshold
hash-max-ziplist-value = 64       # Hash value size threshold
list-max-ziplist-size = -2        # List compression setting
set-max-intset-entries = 512      # Set optimization threshold
zset-max-ziplist-entries = 128    # Sorted set optimization
zset-max-ziplist-value = 64       # Sorted set value threshold

# === SLOW OPERATIONS ===
slowlog-log-slower-than = 10000   # Log operations slower than 10ms
slowlog-max-len = 128             # Maximum slow log entries

# === CLIENT BUFFER LIMITS ===
client-output-buffer-limit-normal = 0 0 0        # Normal clients (unlimited)
client-output-buffer-limit-replica = 256mb 64mb 60   # Replica clients
client-output-buffer-limit-pubsub = 32mb 8mb 60      # Pub/Sub clients

# === KERNEL OPTIMIZATION HINTS ===
# Recommend setting these in /etc/sysctl.conf:
# net.core.somaxconn = 65535
# vm.overcommit_memory = 1
# net.core.netdev_max_backlog = 5000
